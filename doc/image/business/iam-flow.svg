<text x="995.0" y="266.0" text-anchor="middle" class="label">Redis Session</text>
<text x="995.0" y="285.0" text-anchor="middle" class="small">user:session:&lt;userI</text>
<text x="995.0" y="299.0" text-anchor="middle" class="small">D&gt;</text>
